name: Update Steam Market Prices

on:
  schedule:
    - cron: "15 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-market:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update market data
        run: python tools/update_market.py

      - name: Rebuild site
        run: python tools/build_site.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Steam市場価格を更新"
          file_pattern: "market-items.json index.html images/*.png"
